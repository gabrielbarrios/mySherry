<svg width="140" height="140" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cherryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4d6d"/>
      <stop offset="100%" stop-color="#c9184a"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Stem (ligeramente separado) -->
  <path d="M70 42 C75 25, 95 30, 90 48"
        stroke="#2e7d32"
        stroke-width="4"
        fill="none"
        stroke-linecap="round"/>

  <!-- Cherry -->
  <circle cx="70" cy="80" r="35"
          fill="url(#cherryGrad)"
          filter="url(#shadow)"/>

  <!-- Share split -->
  <path d="M70 50 C65 75, 78 95, 70 115"
        stroke="#ffffff"
        stroke-width="2.5"
        stroke-linecap="round"
        fill="none"
        opacity="0.85"/>

  <!-- Highlight (natural, limpio) -->
  <ellipse cx="58" cy="70" rx="7" ry="11"
           fill="#ffffff"
           opacity="0.28"
           transform="rotate(-20 58 70)"/>
</svg>